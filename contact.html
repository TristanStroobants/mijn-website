						<div class="mb-3">

								for="naam"

								>Naam</label

								placeholder="vul hier je naam in" />

						<div class="mb-3">
							<label
								for="Email"
								class="form-label"

						</div>
						<div class="mb-3">

								for="Bericht"

								>Bericht</label
							>
							<textarea
								class="form-control"
								id="Bericht"
								rows="3"></textarea>
						</div>
						<button
							type="submit"
							class="btn orange">
							Submit
						</button>
					</form>
